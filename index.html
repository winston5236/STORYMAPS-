<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>113年台灣環境與人口交互分析地圖</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        body { margin: 0; padding: 0; font-family: "Microsoft JhengHei", sans-serif; }
        #map { position: absolute; top: 0; bottom: 0; width: 100%; }
        
        /* 控制面板樣式 */
        .control-panel {
            position: absolute; top: 10px; left: 50px; z-index: 1000;
            background: rgba(255, 255, 255, 0.95); padding: 15px;
            border-radius: 8px; box-shadow: 0 0 20px rgba(0,0,0,0.2);
            max-width: 320px; border-top: 5px solid #2c3e50;
        }
        
        /* 圖例樣式 */
        .legend {
            background: white; line-height: 20px; color: #333;
            padding: 10px; border-radius: 5px; box-shadow: 0 0 15px rgba(0,0,0,0.1);
        }
        .legend i { width: 18px; height: 18px; float: left; margin-right: 8px; opacity: 0.8; border-radius: 3px; }
    </style>
</head>
<body>

<div class="control-panel">
    <h2 style="margin:0 0 10px 0; font-size: 18px; color: #2c3e50;">113年環境數據疊圖分析</h2>
    <p style="font-size: 13px; color: #555;">
        您可以透過右上角的選單切換圖層，觀察環境汙染與人口分布的關聯性。
    </p>
    <div style="font-size: 12px; border-top: 1px solid #ddd; padding-top: 10px;">
        1. <b>空品圖層</b>：圓圈愈大且紅，代表 AQI>100 日數比率愈高。<br>
        2. <b>人口圖層</b>：全台村里層級人口指標數據。<br>
        3. <b>工商圖層</b>：台北市精密一級發布區家數。
    </div>
</div>

<div id="map"></div>

<script>
    // 1. 初始化地圖，中心點設在台灣
    const map = L.map('map', {
        center: [23.6, 121.0],
        zoom: 7,
        zoomControl: false
    });
    L.control.zoom({ position: 'bottomleft' }).addTo(map);

    // 2. 設置底圖 (選用灰白色調以突出數據層)
    L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
        attribution: '&copy; OpenStreetMap'
    }).addTo(map);

    // --- 圖層 A: 縣市空品統計 (113年CSV數據) ---
    function getAQIColor(d) {
        return d > 10 ? '#800026' : d > 5 ? '#E31A1C' : d > 2 ? '#FD8D3C' : '#FEE391';
    }
    const aqiLayer = L.layerGroup();
    
    // 預填您數據中的關鍵縣市 (範例數據)
    const aqiStats = [
        {"COUNTY": "高雄市", "lat": 22.6, "lng": 120.3, "val": 11.14},
        {"COUNTY": "臺南市", "lat": 23.0, "lng": 120.2, "val": 8.06},
        {"COUNTY": "臺中市", "lat": 24.1, "lng": 120.6, "val": 4.64},
        {"COUNTY": "新北市", "lat": 25.0, "lng": 121.4, "val": 3.28}
    ];

    aqiStats.forEach(item => {
        L.circleMarker([item.lat, item.lng], {
            radius: item.val * 2 + 5,
            fillColor: getAQIColor(item.val),
            color: "#fff", weight: 1, fillOpacity: 0.8
        }).bindPopup(`<b>${item.COUNTY}</b><br>AQI>100比率: ${item.val}%`).addTo(aqiLayer);
    });
    aqiLayer.addTo(map); // 預設顯示

    // --- 圖層 B: 全台村里人口指標 (SHP 預留層) ---
    const populationLayer = L.geoJson(null, {
        style: { color: "#2980b9", weight: 1, fillOpacity: 0.4 }
    });

    // --- 圖層 C: 台北市工商家數 (一級發布區預留層) ---
    const businessLayer = L.geoJson(null, {
        style: { color: "#27ae60", weight: 1, fillOpacity: 0.5 }
    });

    // --- 圖層 D: 行政區地理邊界 ---
    const boundaryLayer = L.geoJson(null, {
        style: { color: "#7f8c8d", weight: 2, fillOpacity: 0, dashArray: '5, 5' }
    });

    // 3. 核心：圖層切換控制 (Toggle Layers)
    const overlayMaps = {
        "<span style='color:#c0392b;font-weight:bold'>☁️ 縣市空品統計</span>": aqiLayer,
        "<span style='color:#2980b9'>👥 村里人口指標</span>": populationLayer,
        "<span style='color:#27ae60'>🏢 台北工商家數</span>": businessLayer,
        "<span style='color:#7f8c8d'>🗺️ 行政地理邊界</span>": boundaryLayer
    };

    L.control.layers(null, overlayMaps, { collapsed: false, position: 'topright' }).addTo(map);

    // 4. 圖例顯示
    const legend = L.control({position: 'bottomright'});
    legend.onAdd = function (map) {
        const div = L.DomUtil.create('div', 'legend');
        const grades = [0, 2, 5, 10];
        div.innerHTML += '<b>AQI>100 日數比率</b><br>';
        for (let i = 0; i < grades.length; i++) {
            div.innerHTML += '<i style="background:' + getAQIColor(grades[i] + 1) + '"></i> ' +
                grades[i] + (grades[i + 1] ? '&ndash;' + grades[i + 1] + '%<br>' : '+%');
        }
        return div;
    };
    legend.addTo(map);

</script>
</body>
</html>
