<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>台北即時空氣品質監測地圖</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body, html { margin: 0; padding: 0; height: 100%; }
        #map { height: 100vh; width: 100%; }
        .aqi-marker {
            background: white; border: 2px solid #333; border-radius: 50%;
            text-align: center; line-height: 30px; font-weight: bold;
        }
    </style>
</head>
<body>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // 1. 初始化地圖
        const map = L.map('map').setView([25.0330, 121.5654], 12);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

        // 2. 建立資料層（Toggle 功能關鍵）
        const aqiLayer = L.layerGroup().addTo(map); 

        // 3. API 串接邏輯
        // 請更換為您在 https://aqicn.org/api/ 申請的 Token
        const API_TOKEN = "demo"; // 暫時用 demo，之後請換成您申請的
        
        // 台北市的主要監測站
        const stations = ["taipei", "songshan", "wanhua", "guanting", "shilin"];

        async function fetchAQIData() {
            aqiLayer.clearLayers(); // 重新整理前先清除舊標記

            for (let city of stations) {
                try {
                    const response = await fetch(`https://api.waqi.info/feed/${city}/?token=${API_TOKEN}`);
                    const result = await response.json();
                    
                    if (result.status === "ok") {
                        const { lat, lon } = result.data.city.geo;
                        const aqi = result.data.aqi;
                        const name = result.data.city.name;

                        // 根據 AQI 數值改變顏色
                        let color = aqi <= 50 ? "#009966" : aqi <= 100 ? "#ffde33" : "#ff9933";

                        // 在地圖上畫出標記
                        L.circleMarker([lat, lon], {
                            radius: 12,
                            fillColor: color,
                            color: "#000",
                            weight: 1,
                            opacity: 1,
                            fillOpacity: 0.8
                        }).addTo(aqiLayer)
                          .bindPopup(`<b>站點：${name}</b><br>即時 AQI：${aqi}<br>更新時間：${result.data.time.s}`);
                    }
                } catch (e) {
                    console.error("無法取得數據:", e);
                }
            }
        }

        // 4. 圖層控制 (Toggle On/Off)
        const overlayMaps = {
            "即時空氣品質 (AQI)": aqiLayer
        };
        L.control.layers(null, overlayMaps, { collapsed: false }).addTo(map);

        // 執行初始抓取，並設定每 5 分鐘自動更新一次
        fetchAQIData();
        setInterval(fetchAQIData, 300000); 

    </script>
</body>
</html>
