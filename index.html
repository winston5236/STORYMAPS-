    <style>
        html, body, #map {
            width: 100%;
            height: 100%;
            margin: 0;
            padding: 0;
            background-color: #f1f5f9;
        }
        .custom-tooltip {
            background: rgba(255, 255, 255, 0.98);
            border: 1px solid #cbd5e1;
            border-radius: 6px;
            padding: 10px;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
        }

        /* 讓車流圖層產生呼吸擴散（光暈）效果的 CSS 設定 */
        .glowing-traffic img {
            animation: pulse-diffusion 3s infinite ease-in-out;
        }

        @keyframes pulse-diffusion {
            0% {
                filter: saturate(2) blur(0.2px);
                opacity: 0.75;
            }
            50% {
                /* 擴散狀態：增加模糊半徑與飽和度 */
                filter: saturate(3) blur(1.8px);
                opacity: 0.95;
            }
            100% {
                filter: saturate(2) blur(0.2px);
                opacity: 0.75;
            }
        }
    </style>
</head>
