    <style>
        html, body, #map {
            width: 100%;
            height: 100%;
            margin: 0;
            padding: 0;
            background-color: #f1f5f9;
        }
        .custom-tooltip {
            background: rgba(255, 255, 255, 0.98);
            border: 1px solid #cbd5e1;
            border-radius: 6px;
            padding: 10px;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
        }

        /* 透過 SVG clipPath 裁剪車流圖層，使其僅顯示在點選的行政區內 */
        .glowing-traffic {
            clip-path: url(#traffic-clip);
        }

        /* 車流呼吸擴散效果 */
        .glowing-traffic img {
            animation: pulse-diffusion 3s infinite ease-in-out;
        }

        @keyframes pulse-diffusion {
            0% {
                filter: saturate(2) blur(0.2px);
                opacity: 0.75;
            }
            50% {
                filter: saturate(3) blur(1.8px);
                opacity: 0.95;
            }
            100% {
                filter: saturate(2) blur(0.2px);
                opacity: 0.75;
            }
        }
    </style>
</head>

        ];

        // 3. 初始化全螢幕地圖 (預設縮放至涵蓋全台，以方便觀察空氣品質)
        const map = L.map('map', {
            center: [23.85, 121.0],
            zoom: 8,
            minZoom: 6,
            maxZoom: 16,
            zoomControl: true
        });

        map.zoomControl.setPosition('topleft');

        // 使用淺色底圖
        L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
            attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> &copy; <a href="https://carto.com/attributions">CARTO</a>'
        }).addTo(map);

        // 4. 建立即時車流 (Google Traffic) 瓦片圖層，但預設先不加入地圖，等點選行政區後才載入
        const trafficLayer = L.tileLayer('https://mt1.google.com/vt/lyrs=h,traffic&hl=zh-TW&x={x}&y={y}&z={z}', {
            attribution: '&copy; Google Maps Traffic',
            maxZoom: 16,
            className: 'glowing-traffic' // 綁定 CSS 動態樣式
        });

        // 5. 建立學校圖層群組，並設定統一顏色（靛藍色 #4f46e5）
        const juniorHighLayer = L.layerGroup();
        const seniorHighLayer = L.layerGroup();
        const schoolColor = '#4f46e5'; 
        
        // 追蹤當前啟用的覆蓋物名稱（預設開啟總懸浮微粒 TSP）
        const activeOverlays = new Set(["國中", "高中職", "空氣中總懸浮微粒 (TSP)", "即時車流"]);

        // 生成學校標記
        schoolData.forEach(school => {
            const marker = L.circleMarker([school.lat, school.lng], {
                radius: 6,
                fillColor: schoolColor, 
                color: '#ffffff',
                weight: 1.5,
                opacity: 1,
                fillOpacity: 0.85
            });

            const tooltipHtml = `
                <div class="custom-tooltip-content">
                    <div class="font-bold text-slate-800 border-b border-slate-100 pb-1 mb-1.5 text-xs">${school.name}</div>
                    <div class="space-y-0.5 text-[10px] text-slate-500">
                        <div><span class="font-medium text-slate-700">• 類型：</span>${school.type}</div>
                        <div><span class="font-medium text-slate-700">• 地址：</span>${school.address}</div>
                    </div>
                </div>
            `;
            marker.bindTooltip(tooltipHtml, { sticky: true, className: 'custom-tooltip' });

            marker.on('click', function(e) {
                map.setView(e.latlng, 15);
            });

            if (school.type === '國中') {
                juniorHighLayer.addLayer(marker);
            } else {
                seniorHighLayer.addLayer(marker);
            }
        });

        // 預設將學校圖層加入地圖
        juniorHighLayer.addTo(map);
        seniorHighLayer.addTo(map);

        // 6. 各種空氣指標顏色分級定義
        function getTspColor(v) {
            if (v === 0) return '#cbd5e1'; // 無測站
            return v > 45 ? '#a855f7' : // 紫
                   v > 40 ? '#ef4444' : // 紅
                   v > 35 ? '#f97316' : // 橘
                   v > 30 ? '#eab308' : // 黃
                            '#10b981';  // 綠
        }

        function getOzoneColor(v) {
            return v > 58 ? '#ef4444' :
                   v > 55 ? '#f97316' :
                   v > 50 ? '#eab308' :
                   v > 45 ? '#10b981' :
                            '#3b82f6'; // 藍
        }

        function getSo2Color(v) {
            return v > 1.6 ? '#a855f7' :
                   v > 1.3 ? '#ef4444' :
                   v > 1.1 ? '#f97316' :
                   v > 0.9 ? '#eab308' :
                             '#10b981';
        }

        function getAqiColor(v) {
            return v > 12.0 ? '#a855f7' :
                   v > 8.0  ? '#ef4444' :
                   v > 4.0  ? '#f97316' :
                   v > 2.0  ? '#eab308' :
                              '#10b981';
        }

        // 縣市名稱智慧對接
        function matchCounty(geojsonName, dataName) {
            const geo = geojsonName.replace(/g/g, '').replace(/台/g, '臺');
            const data = dataName.replace(/g/g, '').replace(/台/g, '臺');
            if (geo === data) return true;
            if (data === "桃園市" && geo === "桃園縣") return true;
            if (data === "臺中市" && geo === "臺中縣") return true;
            if (data === "臺南市" && geo === "臺南縣") return true;
            if (data === "高雄市" && geo === "高雄縣") return true;
            return false;
        }

        function findDataForFeature(feature) {
            const geojsonName = feature.properties.COUNTYNAME || feature.properties.COUNTY || feature.properties.name || "";
            return airData.find(d => matchCounty(geojsonName, d.COUNTY));
        }

        // 7. 載入並渲染行政區 GeoJSON
        const primaryGeoJsonUrl = 'https://cdn.jsdelivr.net/gh/ronnywang/twgeojson@master/twcounty2010.2.json';
        const fallbackGeoJsonUrl = 'https://raw.githubusercontent.com/ronnywang/twgeojson/master/twcounty2010.2.json';

        // 用於追蹤當前被選取的行政區 Feature
        let clickedFeature = null;

        // 共用點選行政區之行為控制 (自動切換/裁剪該縣市即時車流)
        function handleFeatureClick(feature, layer, e) {
            L.DomEvent.stopPropagation(e);
            map.fitBounds(e.target.getBounds());
            clickedFeature = feature;

            if (!map.hasLayer(trafficLayer)) {
                trafficLayer.addTo(map);
            }
            
            updateTrafficClip();
            activeOverlays.add("即時車流");
            updateDynamicLegend();
        }

        function loadGeoJson(url) {
            return fetch(url).then(res => {
                if (!res.ok) throw new Error("HTTP 狀態異常 " + res.status);
                return res.json();
            });
        }

        loadGeoJson(primaryGeoJsonUrl)
            .catch(() => loadGeoJson(fallbackGeoJsonUrl))
            .then(geojson => {
                
                const overlay = document.getElementById('loading-overlay');
                overlay.style.opacity = '0';
                setTimeout(() => overlay.remove(), 300);

                // 產生空氣污染圖層的通用渲染器
                function createPollutionLayer(metric, colorFn, columnName, label, unit) {
                    return L.geoJSON(geojson, {
                        style: function(feature) {
                            const data = findDataForFeature(feature);
                            const val = data ? data[columnName] : 0;
                            return {
                                fillColor: colorFn(val),
                                weight: 1.5,
                                opacity: 0.9,
                                color: '#ffffff',
                                fillOpacity: 0.65
                            };
                        },
                        onEachFeature: function(feature, layer) {
                            const data = findDataForFeature(feature);
                            const countyName = feature.properties.COUNTYNAME || feature.properties.COUNTY || feature.properties.name || "";
                            
                            if (data) {
                                const val = data[columnName];
                                const displayVal = val === 0 ? '無一般監測站' : `${val} ${unit}`;
                                layer.bindTooltip(`
                                    <div class="custom-tooltip-content">
                                        <div class="font-bold text-slate-800 border-b border-slate-100 pb-1.5 mb-2 text-sm">${countyName}</div>
                                        <div class="space-y-1 text-xs">
                                            <div class="font-bold text-indigo-600 flex items-center justify-between gap-4">
                                                <span>• ${label}：</span>
                                                <span class="font-semibold text-slate-800">${displayVal}</span>
                                            </div>
                                            <div class="text-slate-400 text-[10px] border-t border-slate-100 pt-1 mt-1">
                                                點選此縣市可切換顯示其內部即時車流
                                            </div>
                                        </div>
                                    </div>
                                `, { sticky: true, className: 'custom-tooltip' });
                            }

                            layer.on({
                                mouseover: function(e) {
                                    e.target.setStyle({
                                        weight: 2.5,
                                        color: '#334155',
                                        fillOpacity: 0.85
                                    });
                                    juniorHighLayer.eachLayer(m => m.bringToFront());
                                    seniorHighLayer.eachLayer(m => m.bringToFront());
                                },
                                mouseout: function(e) {
                                    const val = data ? data[columnName] : 0;
                                    e.target.setStyle({
                                        fillColor: colorFn(val),
                                        weight: 1.5,
                                        color: '#ffffff',
                                        fillOpacity: 0.65
                                    });
                                },
                                click: function(e) {
                                    handleFeatureClick(feature, layer, e);
                                }
                            });
                        }
                    });
                }

                // A. 建立純背景功能的行政區邊界圖層 (灰色)
                const boundaryLayer = L.geoJSON(geojson, {
                    style: function() {
                        return {
                            fillColor: '#f1f5f9',
                            weight: 1.5,
                            opacity: 0.8,
                            color: '#cbd5e1',
                            fillOpacity: 0.3
                        };
                    },
                    onEachFeature: function(feature, layer) {
                        const countyName = feature.properties.COUNTYNAME || feature.properties.COUNTY || feature.properties.name || "";
                        layer.bindTooltip(`<div class="font-bold text-slate-800 text-xs">${countyName}</div>`, { sticky: true, className: 'custom-tooltip' });
                        
                        layer.on({
                            mouseover: function(e) {
                                e.target.setStyle({
                                    weight: 2.5,
                                    color: '#94a3b8',
                                    fillOpacity: 0.5
                                });
                                juniorHighLayer.eachLayer(m => m.bringToFront());
                                seniorHighLayer.eachLayer(m => m.bringToFront());
                            },
                            mouseout: function(e) {
                                e.target.setStyle({
                                    weight: 1.5,
                                    color: '#cbd5e1',
                                    fillOpacity: 0.3
                                });
                            },
                            click: function(e) {
                                handleFeatureClick(feature, layer, e);
                            }
                        });
                    }
                });

                // 產生四大空氣品質色塊圖層
                const tspLayer = createPollutionLayer('tsp', getTspColor, 'COLUMN1', '總懸浮微粒 (TSP)', 'µg/m³');
                const ozoneLayer = createPollutionLayer('ozone', getOzoneColor, 'COLUMN2', '臭氧 (Ozone)', 'ppb');
                const so2Layer = createPollutionLayer('so2', getSo2Color, 'COLUMN3', '二氧化硫 (SO₂)', 'ppb');
                const aqiLayer = createPollutionLayer('aqi', getAqiColor, 'COLUMN4', 'AQI > 100 日數比率', '%');

                // 預設將 總懸浮微粒 (TSP) 圖層加入地圖上
                tspLayer.addTo(map);

                // 設定圖層切換控制 (移除即時車流核取框，全面交由點擊觸發)
                const overlayMaps = {
                    "國中": juniorHighLayer,
                    "高中職": seniorHighLayer,
                    "空氣中總懸浮微粒 (TSP)": tspLayer,
                    "空氣中臭氧 (Ozone)": ozoneLayer,
                    "二氧化硫 (SO₂)": so2Layer,
                    "AQI > 100 日數比率": aqiLayer,
                    "行政區邊界 (灰色)": boundaryLayer
                };

                L.control.layers(null, overlayMaps, { collapsed: false }).addTo(map);

                // 監聽圖層切換事件更新圖例
                map.on('overlayadd', function(e) {
                    activeOverlays.add(e.name);
                    updateDynamicLegend();
                });

                map.on('overlayremove', function(e) {
                    activeOverlays.delete(e.name);
                    updateDynamicLegend();
                });

                // 預設主動「點選」並聚焦臺北市車流
                const taipeiFeature = geojson.features.find(f => {
                    const name = f.properties.COUNTYNAME || f.properties.COUNTY || f.properties.name || "";
                    return name.replace(/台/g, '臺') === "臺北市";
                });

                if (taipeiFeature) {
                    clickedFeature = taipeiFeature;
                    trafficLayer.addTo(map);
                    activeOverlays.add("即時車流");
                    // 稍作延遲確保圖層節點已附著到 DOM，即可順利執行首次裁剪
                    setTimeout(() => {
                        updateTrafficClip();
                        updateDynamicLegend();
                    }, 50);
                } else {
                    updateDynamicLegend();
                }
            })
            .catch(err => {
                console.error("地圖數據載入失敗:", err);
                const container = document.getElementById('loading-overlay');
                if (container) {
                    container.innerHTML = `
                        <div class="bg-white p-6 rounded-lg shadow-xl max-w-sm text-center border border-slate-200">
                            <p class="text-red-500 font-bold text-lg mb-2">⚠️ 圖資載入超時或失敗</p>
                            <p class="text-slate-600 text-sm mb-4">無法載入邊界地圖。這通常是因為暫時連線至外部 CDN 網路不穩定。</p>
                            <button onclick="window.location.reload()" class="bg-slate-800 text-white px-5 py-2.5 rounded font-semibold text-sm hover:bg-slate-700 transition">重新整理網頁</button>
                        </div>
                    `;
                }
            });

        // 8. 點擊地圖空白處，可重設 (隱藏) 即時車流
        map.on('click', function() {
            clickedFeature = null;
            if (map.hasLayer(trafficLayer)) {
                map.removeLayer(trafficLayer);
            }
            updateTrafficClip();
            activeOverlays.delete("即時車流");
            updateDynamicLegend();
        });

        // 9. 計算與更新 SVG 裁剪路徑
        function updateTrafficClip() {
            const clipPathEl = document.getElementById('traffic-clip-path');
            if (!clipPathEl) return;
            
            if (clickedFeature && map.hasLayer(trafficLayer)) {
                const pathData = getSvgPathFromFeature(clickedFeature);
                clipPathEl.setAttribute('d', pathData);
            } else {
                clipPathEl.setAttribute('d', ''); // 清空裁剪路徑，等同於全部遮蔽
            }
        }

        // 當地圖進行縮放、拖曳移動時，必須同步重新計算轉換像素座標
        map.on('move zoom viewreset drag', updateTrafficClip);

        // 10. 經緯度座標轉換為網頁像素點函數
        function getSvgPathFromFeature(feature) {
            if (!feature || !feature.geometry) return '';
            const type = feature.geometry.type;
            const coords = feature.geometry.coordinates;
            let pathData = '';

            function ringToPath(ring) {
                let str = '';
                for (let i = 0; i < ring.length; i++) {
                    const pt = map.latLngToContainerPoint([ring[i][1], ring[i][0]]);
                    str += (i === 0 ? 'M' : 'L') + ` ${pt.x} ${pt.y} `;
                }
                str += 'Z ';
                return str;
            }

            if (type === 'Polygon') {
                coords.forEach(ring => {
                    pathData += ringToPath(ring);
                });
            } else if (type === 'MultiPolygon') {
                coords.forEach(polygon => {
                    polygon.forEach(ring => {
                        pathData += ringToPath(ring);
                    });
                });
            }
            return pathData;
        }

        // 11. 動態圖例管理器
        function updateDynamicLegend() {
            const container = document.getElementById('legend-content');
            if (!container) return;
            container.innerHTML = '';

            // 過濾掉邊界底圖圖例，以保持面板簡潔
            const legendShowKeys = Array.from(activeOverlays).filter(k => k !== "行政區邊界 (灰色)");

            if (legendShowKeys.length === 0) {
                container.innerHTML = '<div class="text-xs text-slate-400 italic">無選取圖層</div>';
                return;
            }

            legendShowKeys.forEach(layerName => {
                let html = `<div class="border-b border-slate-100 pb-2.5 last:border-0 last:pb-0">
                    <p class="text-xs font-bold text-slate-700 mb-1.5 flex items-center gap-1">
                        <span class="w-1.5 h-1.5 rounded-full bg-slate-400"></span> ${layerName}
                    </p>
                    <div class="space-y-1.5 pl-2.5">`;

                if (layerName === "國中") {
                    html += `
                        <div class="flex items-center text-[10px] text-slate-600">
                            <span class="w-2.5 h-2.5 rounded-full mr-2 inline-block" style="background:${schoolColor}; border: 1px solid #fff"></span>
                            國中 (共 ${schoolData.filter(s => s.type === '國中').length} 所)
                        </div>
                    `;
                } else if (layerName === "高中職") {
                    html += `
                        <div class="flex items-center text-[10px] text-slate-600">
                            <span class="w-2.5 h-2.5 rounded-full mr-2 inline-block" style="background:${schoolColor}; border: 1px solid #fff"></span>
                            高中職 (共 ${schoolData.filter(s => s.type === '高中職').length} 所)
                        </div>
                    `;
                } else if (layerName === "即時車流") {
                    const countyName = clickedFeature ? (clickedFeature.properties.COUNTYNAME || clickedFeature.properties.COUNTY || clickedFeature.properties.name || "選取區") : "";
                    html += `
                        <p class="text-[9px] text-indigo-600 font-semibold mb-1">📍 裁剪範圍：${countyName}</p>
                        <div class="flex items-center text-[10px] text-slate-600"><span class="w-3.5 h-1 mr-2 inline-block" style="background:#10b981"></span>綠色：道路暢通</div>
                        <div class="flex items-center text-[10px] text-slate-600"><span class="w-3.5 h-1 mr-2 inline-block" style="background:#facc15"></span>黃色：車速稍慢</div>
                        <div class="flex items-center text-[10px] text-slate-600"><span class="w-3.5 h-1 mr-2 inline-block" style="background:#f97316"></span>橘色：車流擁擠</div>
                        <div class="flex items-center text-[10px] text-slate-600"><span class="w-3.5 h-1 mr-2 inline-block" style="background:#ef4444"></span>紅色：嚴重堵塞</div>
                        <div class="text-[9px] text-slate-400 italic mt-1">※ 啟用動態光暈擴散。</div>
                    `;
                } else if (layerName === "空氣中總懸浮微粒 (TSP)") {
                    html += `
                        <div class="flex items-center text-[10px] text-slate-600"><span class="w-3 h-2 rounded-sm mr-2 inline-block" style="background:#a855f7"></span>&gt; 45 µg/m³ (高)</div>
                        <div class="flex items-center text-[10px] text-slate-600"><span class="w-3 h-2 rounded-sm mr-2 inline-block" style="background:#ef4444"></span>40 - 45 µg/m³</div>
                        <div class="flex items-center text-[10px] text-slate-600"><span class="w-3 h-2 rounded-sm mr-2 inline-block" style="background:#f97316"></span>35 - 40 µg/m³</div>
                        <div class="flex items-center text-[10px] text-slate-600"><span class="w-3 h-2 rounded-sm mr-2 inline-block" style="background:#eab308"></span>30 - 35 µg/m³</div>
                        <div class="flex items-center text-[10px] text-slate-600"><span class="w-3 h-2 rounded-sm mr-2 inline-block" style="background:#10b981"></span>&lt; 30 µg/m³ (低)</div>
                        <div class="flex items-center text-[10px] text-slate-600"><span class="w-3 h-2 rounded-sm mr-2 inline-block" style="background:#cbd5e1"></span>無一般人工監測站</div>
                    `;
                } else if (layerName === "空氣中臭氧 (Ozone)") {
                    html += `
                        <div class="flex items-center text-[10px] text-slate-600"><span class="w-3 h-2 rounded-sm mr-2 inline-block" style="background:#ef4444"></span>&gt; 58 ppb (高)</div>
                        <div class="flex items-center text-[10px] text-slate-600"><span class="w-3 h-2 rounded-sm mr-2 inline-block" style="background:#f97316"></span>55 - 58 ppb</div>
                        <div class="flex items-center text-[10px] text-slate-600"><span class="w-3 h-2 rounded-sm mr-2 inline-block" style="background:#eab308"></span>50 - 55 ppb</div>
                        <div class="flex items-center text-[10px] text-slate-600"><span class="w-3 h-2 rounded-sm mr-2 inline-block" style="background:#10b981"></span>45 - 50 ppb</div>
                        <div class="flex items-center text-[10px] text-slate-600"><span class="w-3 h-2 rounded-sm mr-2 inline-block" style="background:#3b82f6"></span>&lt; 45 ppb (低)</div>
                    `;
                } else if (layerName === "二氧化硫 (SO₂)") {
                    html += `
                        <div class="flex items-center text-[10px] text-slate-600"><span class="w-3 h-2 rounded-sm mr-2 inline-block" style="background:#a855f7"></span>&gt; 1.6 ppb (高)</div>
                        <div class="flex items-center text-[10px] text-slate-600"><span class="w-3 h-2 rounded-sm mr-2 inline-block" style="background:#ef4444"></span>1.3 - 1.6 ppb</div>
                        <div class="flex items-center text-[10px] text-slate-600"><span class="w-3 h-2 rounded-sm mr-2 inline-block" style="background:#f97316"></span>1.1 - 1.3 ppb</div>
                        <div class="flex items-center text-[10px] text-slate-600"><span class="w-3 h-2 rounded-sm mr-2 inline-block" style="background:#eab308"></span>0.9 - 1.1 ppb</div>
                        <div class="flex items-center text-[10px] text-slate-600"><span class="w-3 h-2 rounded-sm mr-2 inline-block" style="background:#10b981"></span>&lt; 0.9 ppb (低)</div>
                    `;
                } else if (layerName === "AQI > 100 日數比率") {
                    html += `
                        <div class="flex items-center text-[10px] text-slate-600"><span class="w-3 h-2 rounded-sm mr-2 inline-block" style="background:#a855f7"></span>&gt; 12.0% (高)</div>
                        <div class="flex items-center text-[10px] text-slate-600"><span class="w-3 h-2 rounded-sm mr-2 inline-block" style="background:#ef4444"></span>8.0% - 12.0%</div>
                        <div class="flex items-center text-[10px] text-slate-600"><span class="w-3 h-2 rounded-sm mr-2 inline-block" style="background:#f97316"></span>4.0% - 8.0%</div>
                        <div class="flex items-center text-[10px] text-slate-600"><span class="w-3 h-2 rounded-sm mr-2 inline-block" style="background:#eab308"></span>2.0% - 4.0%</div>
                        <div class="flex items-center text-[10px] text-slate-600"><span class="w-3 h-2 rounded-sm mr-2 inline-block" style="background:#10b981"></span>&lt; 2.0% (良好)</div>
                    `;
                }

                html += `</div></div>`;
                container.innerHTML += html;
            });
        }
    </script>
