            border-radius: 6px;
            padding: 10px;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
        }

        /* 讓車流圖層產生呼吸擴散（光暈）效果的 CSS 設定 */
        .glowing-traffic img {
            animation: pulse-diffusion 3s infinite ease-in-out;
        }

        @keyframes pulse-diffusion {
            0% {
                filter: saturate(2) blur(0.2px);
                opacity: 0.75;
            }
            50% {
                /* 擴散狀態：增加模糊半徑與飽和度 */
                filter: saturate(3) blur(1.8px);
                opacity: 0.95;
            }
            100% {
                filter: saturate(2) blur(0.2px);
                opacity: 0.75;
            }
        }

            {name: '私立再興中學', type: '高中職', lat: 24.9852, lng: 121.5542, address: '臺北市文山區興隆路4段2號'},
            {name: '私立景文高中', type: '高中職', lat: 24.9868, lng: 121.5694, address: '臺北市文山區保儀路127號'},
            {name: '私立靜心高中', type: '高中職', lat: 24.9976, lng: 121.5414, address: '臺北市文山區興隆路2段46號'},
            {name: '私立達人高中', type: '高中職', lat: 25.0801, lng: 121.5895, address: '臺北市內湖區內湖路2段314號'},
            {name: '私立泰北高中', type: '高中職', lat: 25.0978, lng: 121.5304, address: '臺北市士林區福林路240號'},
            {name: '私立衛理女中', type: '高中職', lat: 25.1018, lng: 121.5471, address: '臺北市士林區至善路2段321號'},
            {name: '私立華興高中', type: '高中職', lat: 25.1039, lng: 121.5342, address: '臺北市士林區仰德大道1段101號'},
            {name: '私立薇閣高中', type: '高中職', lat: 25.1417, lng: 121.4984, address: '臺北市北投區珠海路50號'},
            {name: '私立幼華高中', type: '高中職', lat: 25.1311, lng: 121.4985, address: '臺北市北投區北投路二段55號'},
            {name: '私立奎山實驗高中', type: '高中職', lat: 25.1147, lng: 121.5173, address: '臺北市北投區明德路200號'},
            {name: '私立育達高中', type: '高中職', lat: 25.0508, lng: 121.5526, address: '臺北市松山區寧安街12號'},
            {name: '私立東方工商', type: '高中職', lat: 25.0331, lng: 121.5516, address: '臺北市大安區信義路4段186巷8號'},
            {name: '私立喬治工商', type: '高中職', lat: 25.0251, lng: 121.5552, address: '臺北市信義區基隆路2段155號'},
            {name: '私立開平餐飲', type: '高中職', lat: 25.0271, lng: 121.5428, address: '臺北市大安區復興南路2段148巷24號'},
            {name: '私立稻江護家', type: '高中職', lat: 25.0664, lng: 121.5262, address: '臺北市中山區新生北路3段55號'},
            {name: '私立開南高中', type: '高中職', lat: 25.0428, lng: 121.5226, address: '臺北市中正區濟南路一段6號'},
            {name: '私立稻江高商', type: '高中職', lat: 25.0628, lng: 121.5117, address: '臺北市大同區民權西路225巷24號'},
            {name: '私立華岡藝校', type: '高中職', lat: 25.1368, lng: 121.5458, address: '臺北市士林區建業路73巷8號'},
            {name: '私立惇敘工商', type: '高中職', lat: 25.1435, lng: 121.5204, address: '臺北市北投區泉源路221號'},
            {name: '私立南華高中', type: '高中職', lat: 25.0197, lng: 121.5332, address: '臺北市中正區汀州路3段58號'},
            {name: '私立志仁高中', type: '高中職', lat: 25.0528, lng: 121.5187, address: '臺北市大同區南京西路64巷17號'}
        ];

        // 2. 初始化地圖（中心點設在臺北市區）
        const map = L.map('map', {
            center: [25.045, 121.55],
            zoom: 12,
            minZoom: 8,
            maxZoom: 16,
            zoomControl: true
        });

        map.zoomControl.setPosition('topleft');

        // 使用淺色底圖
        L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
            attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> &copy; <a href="https://carto.com/attributions">CARTO</a>'
        }).addTo(map);

        // 3. 建立帶有光暈與呼吸擴散效果的即時車流 (Google Traffic) 瓦片圖層
        const trafficLayer = L.tileLayer('https://mt1.google.com/vt/lyrs=h,traffic&hl=zh-TW&x={x}&y={y}&z={z}', {
            attribution: '&copy; Google Maps Traffic',
            maxZoom: 16,
            className: 'glowing-traffic' // 綁定 CSS 動態樣式
        });

        // 4. 建立學校圖層群組，並設定統一顏色（靛藍色 #4f46e5）
        const juniorHighLayer = L.layerGroup();
        const seniorHighLayer = L.layerGroup();
        const schoolColor = '#4f46e5'; 
        
        // 預設開啟圖層
        const activeOverlays = new Set(["國中", "高中職", "即時車流"]);

        // 生成學校標記
        schoolData.forEach(school => {
            const marker = L.circleMarker([school.lat, school.lng], {
                radius: 6,
                fillColor: schoolColor, // 國高中皆使用相同的靛藍色
                color: '#ffffff',
                weight: 1.5,
                opacity: 1,
                fillOpacity: 0.85
            });

            const tooltipHtml = `
                <div class="custom-tooltip-content">
                    <div class="font-bold text-slate-800 border-b border-slate-100 pb-1 mb-1.5 text-xs">${school.name}</div>
                    <div class="space-y-0.5 text-[10px] text-slate-500">
                        <div><span class="font-medium text-slate-700">• 類型：</span>${school.type}</div>
                        <div><span class="font-medium text-slate-700">• 地址：</span>${school.address}</div>
                    </div>
                </div>
            `;
            marker.bindTooltip(tooltipHtml, { sticky: true, className: 'custom-tooltip' });

            marker.on('click', function(e) {
                map.setView(e.latlng, 15);
            });

            if (school.type === '國中') {
                juniorHighLayer.addLayer(marker);
            } else {
                seniorHighLayer.addLayer(marker);
            }
        });

        // 預設將國中、高中職與即時車流圖層加入地圖
        juniorHighLayer.addTo(map);
        seniorHighLayer.addTo(map);
        trafficLayer.addTo(map);

        // 5. 載入並渲染行政區 GeoJSON
        const primaryGeoJsonUrl = 'https://cdn.jsdelivr.net/gh/ronnywang/twgeojson@master/twcounty2010.2.json';
        const fallbackGeoJsonUrl = 'https://raw.githubusercontent.com/ronnywang/twgeojson/master/twcounty2010.2.json';

        function loadGeoJson(url) {
            return fetch(url).then(res => {
                if (!res.ok) throw new Error("HTTP 狀態異常 " + res.status);
                return res.json();
            });
        }

        loadGeoJson(primaryGeoJsonUrl)
            .catch(() => loadGeoJson(fallbackGeoJsonUrl))
            .then(geojson => {
                
                const overlay = document.getElementById('loading-overlay');
                overlay.style.opacity = '0';
                setTimeout(() => overlay.remove(), 300);

                // 建立純背景功能的行政區邊界圖層
                const boundaryLayer = L.geoJSON(geojson, {
                    style: function() {
                        return {
                            fillColor: '#f1f5f9',
                            weight: 1.5,
                            opacity: 0.8,
                            color: '#cbd5e1',
                            fillOpacity: 0.3
                        };
                    },
                    onEachFeature: function(feature, layer) {
                        const countyName = feature.properties.COUNTYNAME || feature.properties.COUNTY || feature.properties.name || "";
                        layer.bindTooltip(`<div class="font-bold text-slate-800 text-xs">${countyName}</div>`, { sticky: true, className: 'custom-tooltip' });
                        
                        layer.on({
                            mouseover: function(e) {
                                e.target.setStyle({
                                    weight: 2.5,
                                    color: '#94a3b8',
                                    fillOpacity: 0.5
                                });
                                // 確保學校標記與路況資訊能保持在最上層
                                juniorHighLayer.eachLayer(m => m.bringToFront());
                                seniorHighLayer.eachLayer(m => m.bringToFront());
                            },
                            mouseout: function(e) {
                                e.target.setStyle({
                                    weight: 1.5,
                                    color: '#cbd5e1',
                                    fillOpacity: 0.3
                                });
                            },
                            click: function(e) {
                                map.fitBounds(e.target.getBounds());
                            }
                        });
                    }
                }).addTo(map);

                // 設定圖層切換控制
                const overlayMaps = {
                    "國中": juniorHighLayer,
                    "高中職": seniorHighLayer,
                    "即時車流": trafficLayer,
                    "行政區邊界": boundaryLayer
                };

                L.control.layers(null, overlayMaps, { collapsed: false }).addTo(map);

                // 監聽圖層切換事件更新圖例
                map.on('overlayadd', function(e) {
                    if (e.name === "國中" || e.name === "高中職" || e.name === "即時車流") {
                        activeOverlays.add(e.name);
                        updateDynamicLegend();
                    }
                });

                map.on('overlayremove', function(e) {
                    if (e.name === "國中" || e.name === "高中職" || e.name === "即時車流") {
                        activeOverlays.delete(e.name);
                        updateDynamicLegend();
                    }
                });

                // 初始化圖例
                updateDynamicLegend();
            })
            .catch(err => {
                console.error("地圖邊界數據載入失敗:", err);
                const container = document.getElementById('loading-overlay');
                if (container) {
                    container.innerHTML = `
                        <div class="bg-white p-6 rounded-lg shadow-xl max-w-sm text-center border border-slate-200">
                            <p class="text-red-500 font-bold text-lg mb-2">⚠️ 圖資載入超時或失敗</p>
                            <p class="text-slate-600 text-sm mb-4">無法載入邊界地圖。這通常是因為暫時連線至外部 CDN 網路不穩定。</p>
                            <button onclick="window.location.reload()" class="bg-slate-800 text-white px-5 py-2.5 rounded font-semibold text-sm hover:bg-slate-700 transition">重新整理網頁</button>
                        </div>
                    `;
                }
            });

        // 6. 動態圖例管理器
        function updateDynamicLegend() {
            const container = document.getElementById('legend-content');
            if (!container) return;
            container.innerHTML = '';

            if (activeOverlays.size === 0) {
                container.innerHTML = '<div class="text-xs text-slate-400 italic">無選取圖層</div>';
                return;
            }

            activeOverlays.forEach(layerName => {
                let html = `<div class="border-b border-slate-100 pb-2.5 last:border-0 last:pb-0">
                    <p class="text-xs font-bold text-slate-700 mb-1.5 flex items-center gap-1">
                        <span class="w-1.5 h-1.5 rounded-full bg-slate-400"></span> ${layerName}
                    </p>
                    <div class="space-y-1.5 pl-2.5">`;

                if (layerName === "國中") {
                    html += `
                        <div class="flex items-center text-[10px] text-slate-600">
                            <span class="w-2.5 h-2.5 rounded-full mr-2 inline-block" style="background:${schoolColor}; border: 1px solid #fff"></span>
                            國中 (共 ${schoolData.filter(s => s.type === '國中').length} 所)
                        </div>
                    `;
                } else if (layerName === "高中職") {
                    html += `
                        <div class="flex items-center text-[10px] text-slate-600">
                            <span class="w-2.5 h-2.5 rounded-full mr-2 inline-block" style="background:${schoolColor}; border: 1px solid #fff"></span>
                            高中職 (共 ${schoolData.filter(s => s.type === '高中職').length} 所)
                        </div>
                    `;
                } else if (layerName === "即時車流") {
                    html += `
                        <div class="flex items-center text-[10px] text-slate-600"><span class="w-3.5 h-1 mr-2 inline-block" style="background:#10b981"></span>綠色：道路暢通</div>
                        <div class="flex items-center text-[10px] text-slate-600"><span class="w-3.5 h-1 mr-2 inline-block" style="background:#facc15"></span>黃色：車速稍慢</div>
                        <div class="flex items-center text-[10px] text-slate-600"><span class="w-3.5 h-1 mr-2 inline-block" style="background:#f97316"></span>橘色：車流擁擠</div>
                        <div class="flex items-center text-[10px] text-slate-600"><span class="w-3.5 h-1 mr-2 inline-block" style="background:#ef4444"></span>紅色：嚴重堵塞</div>
                        <div class="text-[9px] text-slate-400 italic mt-1.5">※ 車流線條已啟用動態光暈擴散效果。</div>
                    `;
                }

                html += `</div></div>`;
                container.innerHTML += html;
            });
        }
    </script>
</body>
</html>
