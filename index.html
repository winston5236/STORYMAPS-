<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>台灣空白基礎地圖 (Leaflet 環境測試)</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <style>
        html, body, #map {
            width: 100%;
            height: 100%;
            margin: 0;
            padding: 0;
            background-color: #f1f5f9;
        }
    </style>
</head>
<body class="overflow-hidden font-sans">

    <!-- 左上角懸浮式標題面板 -->
    <div class="absolute top-4 left-16 bg-white/95 backdrop-blur px-5 py-3 rounded-lg shadow-lg z-[1000] border border-slate-200 pointer-events-auto">
        <h1 class="text-lg font-bold text-slate-800">🌍 台灣空白基礎地圖</h1>
        <p class="text-[11px] text-slate-500 mt-1">此地圖無任何外部資料與運作邏輯，適合用來驗證本機環境是否能正常開啟地圖</p>
    </div>

    <!-- 地圖主容器 -->
    <div id="map"></div>

    <script>
        // 初始化地圖，並將視角中心定位在台灣
        const map = L.map('map', {
            center: [23.85, 121.0],
            zoom: 8,
            minZoom: 6,
            maxZoom: 18,
            zoomControl: true
        });

        // 將縮放控制按鈕放置於左上角
        map.zoomControl.setPosition('topleft');

        // 載入 CartoDB Positron 極簡灰階底圖
        // （此底圖圖片載入不受 file:/// 安全政策限制，雙擊檔案即可直接看到地圖）
        L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
            attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> &copy; <a href="https://carto.com/attributions">CARTO</a>'
        }).addTo(map);
    </script>
</body>
</html>
