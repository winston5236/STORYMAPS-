<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>臺北市綜合資料分層地圖系統</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body, html { margin: 0; padding: 0; height: 100%; font-family: "Microsoft JhengHei", sans-serif; }
        #map { height: 100vh; width: 100%; }
        .info-legend { background: white; padding: 10px; border-radius: 5px; box-shadow: 0 0 10px rgba(0,0,0,0.2); line-height: 1.5; }
    </style>
</head>
<body>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // 1. 初始化地圖
        const map = L.map('map').setView([25.0450, 121.5400], 12);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
            attribution: '© OpenStreetMap'
        }).addTo(map);

        // --- A. 學校分佈圖層 (點位資料) ---
        const schoolLayer = L.layerGroup();
        // 示範資料 (地址需轉換為經緯度，這裡先放前 5 筆)
        const schoolData = [
            { name: "國立北教大實小", type: "國小", lat: 25.0245, lng: 121.5448, addr: "大安區和平東路2段94號" },
            { name: "國立政大實小", type: "國小", lat: 24.9856, lng: 121.5768, addr: "文山區指南路三段12號" },
            { name: "松山國小", type: "國小", lat: 25.0504, lng: 121.5786, addr: "松山區八德路四段746號" },
            { name: "敦化國小", type: "國小", lat: 25.0487, lng: 121.5491, addr: "松山區敦化北路2號" },
            { name: "成功高中", type: "高中職", lat: 25.0422, lng: 121.5245, addr: "中正區濟南路1段71號" }
        ];

        schoolData.forEach(s => {
            L.marker([s.lat, s.lng])
             .bindPopup(`<b>${s.name}</b><br>類型：${s.type}<br>地址：${s.addr}`)
             .addTo(schoolLayer);
        });

        // --- B. 行政區資料層 (面狀/區域資料) ---
        // 這裡建立行政區統計數據 (人口與工商家數)
        const districtData = {
            "大安區": { pop: 284000, biz: 52000, latlng: [25.026, 121.543] },
            "內湖區": { pop: 272000, biz: 38000, latlng: [25.069, 121.589] },
            "信義區": { pop: 203000, biz: 41000, latlng: [25.030, 121.567] },
            "士林區": { pop: 264000, biz: 29000, latlng: [25.120, 121.520] }
        };

        const popLayer = L.layerGroup();
        const bizLayer = L.layerGroup();

        // 建立視覺化圈圈 (半徑代表數值大小)
        Object.keys(districtData).forEach(name => {
            const d = districtData[name];
            // 人口圓圈 (紅色)
            L.circle(d.latlng, { radius: d.pop/50, color: 'red', fillOpacity: 0.2 })
             .bindPopup(`${name} 人口：${d.pop} 人`)
             .addTo(popLayer);
            // 工商家數圓圈 (藍色)
            L.circle(d.latlng, { radius: d.biz/5, color: 'blue', fillOpacity: 0.2 })
             .bindPopup(`${name} 工商家數：${d.biz} 家`)
             .addTo(bizLayer);
        });

        // --- C. 即時空氣品質圖層 (AQICN) ---
        const aqicnLayer = L.tileLayer('https://tiles.waqi.info/tiles/usepa-aqi/{z}/{x}/{y}.png?token=demo', {
            opacity: 0.6
        }).addTo(map);

        // 2. 圖層切換控制台 (Toggle)
        const baseMaps = {
            "底圖 (淺色)": L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png')
        };

        const overlayMaps = {
            "🏫 學校分佈": schoolLayer,
            "👥 行政區人口": popLayer,
            "🏢 工商家數": bizLayer,
            "☁️ 即時空氣品質": aqicnLayer
        };

        L.control.layers(baseMaps, overlayMaps, { collapsed: false }).addTo(map);

        // 預設開啟學校圖層
        schoolLayer.addTo(map);

    </script>
</body>
</html>
