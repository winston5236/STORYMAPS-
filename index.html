<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>臺北市學校、人口與空品歷史統計地圖</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body, html { margin: 0; padding: 0; height: 100%; font-family: "Microsoft JhengHei", sans-serif; }
        #map { height: 100vh; width: 100%; }
        
        /* 側邊綜合資料面板樣式 */
        .data-panel {
            position: absolute; bottom: 20px; right: 20px; z-index: 1000;
            background: rgba(255, 255, 255, 0.95); padding: 15px; border-radius: 8px;
            box-shadow: 0 0 15px rgba(0,0,0,0.2); max-width: 350px;
            max-height: 80vh; overflow-y: auto; border: 1px solid #ccc;
        }
        table { width: 100%; border-collapse: collapse; font-size: 11px; margin-bottom: 10px; margin-top: 5px; }
        th, td { border: 1px solid #ddd; padding: 6px; text-align: center; }
        th { background-color: #f8f9fa; position: sticky; top: 0; color: #333; }
        .panel-title { font-size: 16px; font-weight: bold; display: block; margin-bottom: 8px; color: #2c3e50; border-bottom: 2px solid #3498db; padding-bottom: 5px; }
        strong { font-size: 12px; color: #2980b9; display: block; margin-top: 10px; }
        small { color: #7f8c8d; font-size: 10px; line-height: 1.4; display: block; margin-top: 10px; }
        
        /* 自定義 Popup 樣式 */
        .custom-popup .leaflet-popup-content-wrapper { background: #fff; color: #333; border-radius: 5px; }
    </style>
</head>
<body>

    <div id="map"></div>

    <div class="data-panel" id="combined-panel" style="display:none;">
        <span class="panel-title">113年 綜合指標對照</span>
        
        <strong>1. 空氣品質監測 (北部縣市)</strong>
        <table>
            <tr><th>縣市</th><th>TSP</th><th>臭氧</th><th>AQI>100%</th></tr>
            <tr style="background:#e3f2fd"><td>臺北市</td><td>30.5</td><td>48.61</td><td>1.97%</td></tr>
            <tr><td>新北市</td><td>35.2</td><td>50.99</td><td>3.28%</td></tr>
            <tr><td>桃園市</td><td>-</td><td>49.11</td><td>2.80%</td></tr>
            <tr><td>基隆市</td><td>34.8</td><td>49.09</td><td>1.64%</td></tr>
        </table>

        <strong>2. 臺北市工商總家數 (行政區範例)</strong>
        <table>
            <tr><th>行政區</th><th>總家數</th><th>主要產業</th></tr>
            <tr><td>中山區</td><td>32,451</td><td>批發零售業</td></tr>
            <tr><td>大安區</td><td>28,942</td><td>專業科學技術</td></tr>
            <tr><td>內湖區</td><td>15,670</td><td>資訊通訊傳播</td></tr>
        </table>

        <strong>3. 人口指標 (113年12月)</strong>
        <table>
            <tr><th>項目</th><th>數值</th><th>說明</th></tr>
            <tr><td>臺北市總人口</td><td>2,504,831</td><td>持續負成長</td></tr>
            <tr><td>性別比</td><td>90.2</td><td>女多於男</td></tr>
            <tr><td>人口密度</td><td>9,215</td><td>人/km²</td></tr>
        </table>
        
        <small>數據來源：環境部空品資料、內政部人口統計、臺北市工商普查統計資料庫</small>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // --- 1. 初始化地圖 ---
        const map = L.map('map', {
            center: [25.0450, 121.5400],
            zoom: 12,
            zoomControl: true
        });

        const baseLayers = {
            "標準地圖": L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                attribution: '&copy; OpenStreetMap'
            }).addTo(map)
        };

        // --- 2. 學校圖層 (靜態標註) ---
        const schoolLayer = L.layerGroup();
        const schools = [
            { name: "國立北教大實小", type: "國小", pos: [25.0245, 121.5448] },
            { name: "國立政大實小", type: "國小", pos: [24.9856, 121.5768] },
            { name: "松山國小", type: "國小", pos: [25.0504, 121.5786] },
            { name: "成功高中", type: "高中職", pos: [25.0422, 121.5245] },
            { name: "臺北市立大學", type: "大學", pos: [25.0354, 121.5132] }
        ];

        schools.forEach(s => {
            L.circleMarker(s.pos, { 
                radius: 7, 
                color: '#2c3e50', 
                fillColor: '#34495e', 
                fillOpacity: 0.9,
                weight: 2
            })
            .bindPopup(`<b>${s.name}</b><br>教育類別：${s.type}`)
            .addTo(schoolLayer);
        });

        // --- 3. 綜合資料圖層 (區域視覺化) ---
        const dataLayer = L.layerGroup();
        
        // 臺北市核心影響圈示意
        L.circle([25.0330, 121.5654], {
            radius: 4500, 
            color: '#e67e22', 
            weight: 2, 
            fillColor: '#f39c12',
            fillOpacity: 0.15
        }).bindPopup(`
            <div style="width:220px">
                <b style="font-size:14px; color:#d35400;">臺北市 113年度綜合觀察</b><hr style="margin:5px 0">
                <b>💨 空氣：</b>AQI > 100 日數比率 1.97%<br>
                <b>🏢 工商：</b>總登記家數突破 24 萬家<br>
                <b>👥 人口：</b>大安、信義區人口密度極高<br>
                <span style="color:blue; font-size:10px;">* 詳細數據請見右下方資訊面板</span>
            </div>
        `).addTo(dataLayer);

        // --- 4. WAQI 即時空品圖層 ---
        const realTimeAQI = L.tileLayer('https://tiles.waqi.info/tiles/usepa-aqi/{z}/{x}/{y}.png?token=demo', {
            attribution: 'Air Quality Tile &copy; <a href="https://waqi.info">waqi.info</a>'
        });

        // --- 5. 圖層控制與面板聯動 ---
        const overlays = {
            "🏫 學校分佈": schoolLayer,
            "📊 113年綜合統計資料": dataLayer,
            "☁️ 即時空氣品質 (動態)": realTimeAQI
        };

        L.control.layers(null, overlays, { collapsed: false, position: 'topright' }).addTo(map);

        // 聯動邏輯：當勾選「綜合統計資料」時，自動顯示右下角面板
        map.on('overlayadd', function(e) {
            if(e.name === "📊 113年綜合統計資料") {
                document.getElementById('combined-panel').style.display = 'block';
            }
        });

        map.on('overlayremove', function(e) {
            if(e.name === "📊 113年綜合統計資料") {
                document.getElementById('combined-panel').style.display = 'none';
            }
        });

        // 預設載入學校圖層
        schoolLayer.addTo(map);

    </script>
</body>
</html>
