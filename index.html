<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>臺北市學校與空品歷史統計地圖</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body, html { margin: 0; padding: 0; height: 100%; font-family: "Microsoft JhengHei", sans-serif; }
        #map { height: 100vh; width: 100%; }
        .data-panel {
            position: absolute; bottom: 20px; right: 20px; z-index: 1000;
            background: white; padding: 15px; border-radius: 8px;
            box-shadow: 0 0 10px rgba(0,0,0,0.3); max-width: 300px;
        }
        table { width: 100%; border-collapse: collapse; font-size: 12px; }
        th, td { border: 1px solid #ddd; padding: 4px; text-align: center; }
        th { background-color: #f4f4f4; }
    </style>
</head>
<body>

    <div id="map"></div>

    <div class="data-panel" id="stats-panel" style="display:none;">
        <strong>113年 北部縣市空品對照</strong>
        <table>
            <tr><th>縣市</th><th>TSP</th><th>臭氧</th><th>AQI>100%</th></tr>
            <tr><td>基隆市</td><td>34.8</td><td>49.09</td><td>1.64%</td></tr>
            <tr style="background:#e3f2fd"><td>臺北市</td><td>30.5</td><td>48.61</td><td>1.97%</td></tr>
            <tr><td>新北市</td><td>35.2</td><td>50.99</td><td>3.28%</td></tr>
            <tr><td>桃園市</td><td>0</td><td>49.11</td><td>2.80%</td></tr>
        </table>
        <small>數據來源：113年行政區空品監測統計 </small>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // 1. 初始化地圖
        const map = L.map('map').setView([25.0450, 121.5400], 12);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

        // 2. 學校圖層 (由您提供的清單轉換)
        const schoolLayer = L.layerGroup();
        const schools = [
            { name: "國立北教大實小", type: "國小", pos: [25.0245, 121.5448] },
            { name: "國立政大實小", type: "國小", pos: [24.9856, 121.5768] },
            { name: "松山國小", type: "國小", pos: [25.0504, 121.5786] },
            { name: "成功高中", type: "高中職", pos: [25.0422, 121.5245] },
            { name: "臺北市立大學", type: "大學", pos: [25.0354, 121.5132] }
        ];
        schools.forEach(s => {
            L.circleMarker(s.pos, { radius: 6, color: '#2c3e50', fillOpacity: 0.8 })
             .bindPopup(`<b>${s.name}</b><br>類別：${s.type}`)
             .addTo(schoolLayer);
        });

        // 3. 113年 歷史統計圖層 (使用您提供的 CSV 數據建立圓框) 
        const historyLayer = L.layerGroup();
        // 臺北市數據：TSP 30.5, Ozone 48.61, AQI>100 比率 1.97% 
        L.circle([25.0330, 121.5654], {
            radius: 3000, color: 'blue', weight: 2, fillOpacity: 0.1
        }).bindPopup("<b>臺北市 113年年度統計</b><br>TSP: 30.5<br>臭氧: 48.61<br>AQI不良日比率: 1.97% ")
          .addTo(historyLayer);

        // 4. 即時同步 AQI 圖層
        const realTimeAQI = L.tileLayer('https://tiles.waqi.info/tiles/usepa-aqi/{z}/{x}/{y}.png?token=demo');

        // 5. 圖層開關控制
        const overlays = {
            "🏫 學校分佈": schoolLayer,
            "📊 113年歷史空品統計": historyLayer,
            "☁️ 即時空氣品質 (同步)": realTimeAQI
        };
        L.control.layers(null, overlays, { collapsed: false }).addTo(map);

        // 監聽面板顯示
        map.on('overlayadd', (e) => {
            if(e.name === "📊 113年歷史空品統計") document.getElementById('stats-panel').style.display = 'block';
        });
        map.on('overlayremove', (e) => {
            if(e.name === "📊 113年歷史空品統計") document.getElementById('stats-panel').style.display = 'none';
        });

        schoolLayer.addTo(map); // 預設開啟
    </script>
</body>
</html>
