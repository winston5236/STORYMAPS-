<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>113年行政區空氣品質監測分佈地圖</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <style>
        html, body, #map {
            width: 100%;
            height: 100%;
            margin: 0;
            padding: 0;
            background-color: #f1f5f9;
        }
        .custom-tooltip {
            background: rgba(255, 255, 255, 0.98);
            border: 1px solid #cbd5e1;
            border-radius: 6px;
            padding: 10px;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
        }
    </style>
</head>
<body class="overflow-hidden font-sans">

    <!-- 載入中遮罩 (改用 89KB 輕量地圖後，此畫面通常只會閃現 0.1 秒即自動消失) -->
    <div id="loading-overlay" class="absolute inset-0 bg-slate-950/80 flex flex-col items-center justify-center z-[9999] transition-opacity duration-300">
        <div id="loading-content" class="flex flex-col items-center justify-center">
            <div class="animate-spin rounded-full h-12 w-12 border-4 border-emerald-500 border-t-transparent mb-4"></div>
            <p class="text-white font-medium text-lg">正在載入行政區邊界與污染監測分佈...</p>
            <p class="text-slate-400 text-xs mt-2">使用極簡版圖資 (89 KB) 加速渲染中</p>
        </div>
    </div>

    <!-- 左上角懸浮式標題面板 -->
    <div class="absolute top-4 left-16 bg-white/95 backdrop-blur px-5 py-3 rounded-lg shadow-lg z-[1000] border border-slate-200 pointer-events-auto">
        <h1 class="text-lg font-bold text-slate-800 flex items-center gap-1.5">
            <span>🌍</span> 113年行政區空氣品質監測分佈
        </h1>
        <p class="text-[11px] text-slate-500 mt-0.5">滑鼠懸停至縣市區塊可檢視詳細數值 | 右上角可切換/疊加圖層</p>
    </div>

    <!-- 地圖主容器 -->
    <div id="map"></div>

    <!-- 右下角動態圖例面板 -->
    <div id="legend-panel" class="absolute bottom-4 right-4 bg-white/95 backdrop-blur p-4 rounded-lg shadow-lg z-[1000] max-h-[350px] overflow-y-auto w-64 border border-slate-200">
        <h4 class="text-xs font-bold text-slate-700 border-b border-slate-100 pb-1.5 mb-2.5">分佈圖例說明</h4>
        <div id="legend-content" class="space-y-4">
            <!-- 圖例內容由JS根據目前開啟圖層動態生成 -->
        </div>
    </div>

    <script>
        // 1. 113年行政區空氣品質監測統計資料 (由您的 CSV 整理而得)
        const airData = [
            {"COUNTY_ID":"65000","COUNTY":"新北市","COLUMN1":35.2,"COLUMN2":50.99,"COLUMN3":0.93,"COLUMN4":3.28},
            {"COUNTY_ID":"63000","COUNTY":"臺北市","COLUMN1":30.5,"COLUMN2":48.61,"COLUMN3":0.98,"COLUMN4":1.97},
            {"COUNTY_ID":"68000","COUNTY":"桃園市","COLUMN1":0,"COLUMN2":49.11,"COLUMN3":1.2,"COLUMN4":2.8},
            {"COUNTY_ID":"66000","COUNTY":"臺中市","COLUMN1":47.8,"COLUMN2":54.52,"COLUMN3":1.3,"COLUMN4":4.64},
            {"COUNTY_ID":"67000","COUNTY":"臺南市","COLUMN1":42.1,"COLUMN2":55.26,"COLUMN3":1.2,"COLUMN4":8.06},
            {"COUNTY_ID":"64000","COUNTY":"高雄市","COLUMN1":42.6,"COLUMN2":55.8,"COLUMN3":1.56,"COLUMN4":11.14},
            {"COUNTY_ID":"10002","COUNTY":"宜蘭縣","COLUMN1":24.9,"COLUMN2":43.69,"COLUMN3":0.78,"COLUMN4":0.55},
            {"COUNTY_ID":"10004","COUNTY":"新竹縣","COLUMN1":39.8,"COLUMN2":51.68,"COLUMN3":0.85,"COLUMN4":3.96},
            {"COUNTY_ID":"10005","COUNTY":"苗栗縣","COLUMN1":27.3,"COLUMN2":53.09,"COLUMN3":1.32,"COLUMN4":3.14},
            {"COUNTY_ID":"10007","COUNTY":"彰化縣","COLUMN1":48.9,"COLUMN2":55.24,"COLUMN3":1.33,"COLUMN4":8.38},
            {"COUNTY_ID":"10008","COUNTY":"南投縣","COLUMN1":34.6,"COLUMN2":60.52,"COLUMN3":0.96,"COLUMN4":9.43},
            {"COUNTY_ID":"10009","COUNTY":"雲林縣","COLUMN1":45.7,"COLUMN2":56.19,"COLUMN3":1.35,"COLUMN4":10.66},
            {"COUNTY_ID":"10010","COUNTY":"嘉義縣","COLUMN1":45.1,"COLUMN2":55.59,"COLUMN3":1.68,"COLUMN4":8.33},
            {"COUNTY_ID":"10013","COUNTY":"屏東縣","COLUMN1":50.0,"COLUMN2":56.8,"COLUMN3":1.04,"COLUMN4":12.16},
            {"COUNTY_ID":"10014","COUNTY":"臺東縣","COLUMN1":25.1,"COLUMN2":38.66,"COLUMN3":0.9,"COLUMN4":0.55},
            {"COUNTY_ID":"10015","COUNTY":"花蓮縣","COLUMN1":28.1,"COLUMN2":41.46,"COLUMN3":0.82,"COLUMN4":0.55},
            {"COUNTY_ID":"10016","COUNTY":"澎湖縣","COLUMN1":0,"COLUMN2":51.33,"COLUMN3":0.97,"COLUMN4":2.73},
            {"COUNTY_ID":"10017","COUNTY":"基隆市","COLUMN1":34.8,"COLUMN2":49.09,"COLUMN3":1.13,"COLUMN4":1.64},
            {"COUNTY_ID":"10018","COUNTY":"新竹市","COLUMN1":34.4,"COLUMN2":49.67,"COLUMN3":1.21,"COLUMN4":3.55},
            {"COUNTY_ID":"10020","COUNTY":"嘉義市","COLUMN1":49.4,"COLUMN2":59.13,"COLUMN3":1.99,"COLUMN4":10.38},
            {"COUNTY_ID":"09020","COUNTY":"金門縣","COLUMN1":0,"COLUMN2":56.08,"COLUMN3":1.35,"COLUMN4":16.67},
            {"COUNTY_ID":"09007","COUNTY":"連江縣","COLUMN1":0,"COLUMN2":57.88,"COLUMN3":0.89,"COLUMN4":15.85}
        ];

        // 2. 初始化全螢幕地圖
        const map = L.map('map', {
            center: [23.85, 121.0],
            zoom: 8,
            minZoom: 6,
            maxZoom: 11,
            zoomControl: true
        });

        // 定位預設 Zoom Control 位置
        map.zoomControl.setPosition('topleft');

        // 使用極簡淡雅色調的 CartoDB Positron 底圖，讓彩色分佈圖層更明顯
        L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
            attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> &copy; <a href="https://carto.com/attributions">CARTO</a>'
        }).addTo(map);

        // 3. 縣市名稱智慧對接 (將地圖與數據比對，容錯「縣改市」、「台/臺」轉換)
        function matchCounty(geojsonName, dataName) {
            const geo = geojsonName.replace(/台/g, '臺');
            const data = dataName.replace(/台/g, '臺');
            if (geo === data) return true;
            if (data === "桃園市" && geo === "桃園縣") return true;
            if (data === "臺中市" && geo === "臺中縣") return true;
            if (data === "臺南市" && geo === "臺南縣") return true;
            if (data === "高雄市" && geo === "高雄縣") return true;
            return false;
        }

        // 強健式地圖屬性抓取：自動匹配各種可能存在的 GeoJSON 縣市名稱屬性欄位
        function findDataForFeature(feature) {
            const geojsonName = feature.properties.COUNTYNAME || feature.properties.COUNTY || feature.properties.name || "";
            return airData.find(d => matchCounty(geojsonName, d.COUNTY));
        }

        // 4. 各指標顏色分級定義
        function getTspColor(v) {
            if (v === 0) return '#cbd5e1'; // 無測站
            return v > 45 ? '#a855f7' : // 紫
                   v > 40 ? '#ef4444' : // 紅
                   v > 35 ? '#f97316' : // 橘
                   v > 30 ? '#eab308' : // 黃
                            '#10b981';  // 綠
        }

        function getOzoneColor(v) {
            return v > 58 ? '#ef4444' :
                   v > 55 ? '#f97316' :
                   v > 50 ? '#eab308' :
                   v > 45 ? '#10b981' :
                            '#3b82f6'; // 藍
        }

        function getSo2Color(v) {
            return v > 1.6 ? '#a855f7' :
                   v > 1.3 ? '#ef4444' :
                   v > 1.1 ? '#f97316' :
                   v > 0.9 ? '#eab308' :
                             '#10b981';
        }

        function getAqiColor(v) {
            return v > 12.0 ? '#a855f7' :
                   v > 8.0  ? '#ef4444' :
                   v > 4.0  ? '#f97316' :
                   v > 2.0  ? '#eab308' :
                              '#10b981';
        }

        // 5. 建立圖層與預設追蹤
        let tspLayer, ozoneLayer, so2Layer, aqiLayer;
        const activeOverlays = new Set(["空氣中總懸浮微粒 (TSP)"]); // 預設開啟 TSP 圖層

        // 6. 載入並渲染行政區 GeoJSON
        // 採用超輕量 89 KB 行政區圖資 (twcounty2010.2.json)，並設有備用路徑以防 CDN 臨時故障
        const primaryGeoJsonUrl = 'https://cdn.jsdelivr.net/gh/ronnywang/twgeojson@master/twcounty2010.2.json';
        const fallbackGeoJsonUrl = 'https://raw.githubusercontent.com/ronnywang/twgeojson/master/twcounty2010.2.json';

        function loadGeoJson(url) {
            return fetch(url).then(res => {
                if (!res.ok) throw new Error("HTTP 狀態異常 " + res.status);
                return res.json();
            });
        }

        loadGeoJson(primaryGeoJsonUrl)
            .catch(() => loadGeoJson(fallbackGeoJsonUrl)) // 當 jsDelivr 異常時，自動導向 GitHub 原始路徑
            .then(geojson => {
                
                // 順利取得資料後，關閉並淡出「載入中」遮罩
                const overlay = document.getElementById('loading-overlay');
                overlay.style.opacity = '0';
                setTimeout(() => overlay.remove(), 300);

                // 產生圖層渲染器
                function createLayer(metric) {
                    return L.geoJSON(geojson, {
                        style: function(feature) {
                            const data = findDataForFeature(feature);
                            let fillColor = '#cbd5e1';
                            if (data) {
                                if (metric === 'tsp') fillColor = getTspColor(data.COLUMN1);
                                if (metric === 'ozone') fillColor = getOzoneColor(data.COLUMN2);
                                if (metric === 'so2') fillColor = getSo2Color(data.COLUMN3);
                                if (metric === 'aqi') fillColor = getAqiColor(data.COLUMN4);
                            }
                            return {
                                fillColor: fillColor,
                                weight: 1.5,
                                opacity: 0.9,
                                color: '#ffffff',
                                fillOpacity: 0.65 // 半透明設定，有利多層疊加透視
                            };
                        },
                        onEachFeature: function(feature, layer) {
                            const data = findDataForFeature(feature);
                            
                            // 滑鼠互動
                            layer.on({
                                mouseover: function(e) {
                                    const layerObj = e.target;
                                    layerObj.setStyle({
                                        weight: 3,
                                        color: '#334155',
                                        fillOpacity: 0.85
                                    });
                                    if (!L.Browser.ie && !L.Browser.opera && !L.Browser.edge) {
                                        layerObj.bringToFront();
                                    }
                                },
                                mouseout: function(e) {
                                    const layerObj = e.target;
                                    let origColor = '#cbd5e1';
                                    if (data) {
                                        if (metric === 'tsp') origColor = getTspColor(data.COLUMN1);
                                        if (metric === 'ozone') origColor = getOzoneColor(data.COLUMN2);
                                        if (metric === 'so2') origColor = getSo2Color(data.COLUMN3);
                                        if (metric === 'aqi') origColor = getAqiColor(data.COLUMN4);
                                    }
                                    layerObj.setStyle({
                                        fillColor: origColor,
                                        weight: 1.5,
                                        color: '#ffffff',
                                        fillOpacity: 0.65
                                    });
                                },
                                click: function(e) {
                                    map.fitBounds(e.target.getBounds());
                                }
                            });

                            // 滑鼠懸浮提示框 (包含 4 項指標數值，當前檢視項目會加粗強調)
                            if (data) {
                                let labelHtml = `
                                    <div class="custom-tooltip-content">
                                        <div class="font-bold text-slate-800 border-b border-slate-100 pb-1.5 mb-2 text-sm">${data.COUNTY}</div>
                                        <div class="space-y-1 text-xs">
                                            <div class="${metric === 'tsp' ? 'font-bold text-slate-800' : 'text-slate-500'} flex items-center justify-between gap-4">
                                                <span>• 總懸浮微粒 (TSP)：</span>
                                                <span class="font-semibold">${data.COLUMN1 === 0 ? '無監測站' : data.COLUMN1 + ' µg/m³'}</span>
                                            </div>
                                            <div class="${metric === 'ozone' ? 'font-bold text-slate-800' : 'text-slate-500'} flex items-center justify-between gap-4">
                                                <span>• 臭氧濃度 (Ozone)：</span>
                                                <span class="font-semibold">${data.COLUMN2} ppb</span>
                                            </div>
                                            <div class="${metric === 'so2' ? 'font-bold text-slate-800' : 'text-slate-500'} flex items-center justify-between gap-4">
                                                <span>• 二氧化硫 (SO₂)：</span>
                                                <span class="font-semibold">${data.COLUMN3} ppb</span>
                                            </div>
                                            <div class="${metric === 'aqi' ? 'font-bold text-slate-800' : 'text-slate-500'} flex items-center justify-between gap-4">
                                                <span>• AQI > 100 日數比：</span>
                                                <span class="font-semibold">${data.COLUMN4}%</span>
                                            </div>
                                        </div>
                                    </div>
                                `;
                                layer.bindTooltip(labelHtml, { sticky: true, className: 'custom-tooltip' });
                            }
                        }
                    });
                }

                // 初始化圖層
                tspLayer = createLayer('tsp');
                ozoneLayer = createLayer('ozone');
                so2Layer = createLayer('so2');
                aqiLayer = createLayer('aqi');

                // 預設在地圖啟用第一個圖層 (總懸浮微粒)
                tspLayer.addTo(map);

                // 設定圖層控制 (提供 Toggle 開關進行疊圖)
                const overlayMaps = {
                    "空氣中總懸浮微粒 (TSP)": tspLayer,
                    "空氣中臭氧 (Ozone)": ozoneLayer,
                    "二氧化硫 (SO₂)": so2Layer,
                    "AQI > 100 日數比率": aqiLayer
                };

                L.control.layers(null, overlayMaps, { collapsed: false }).addTo(map);

                // 監聽疊圖開關事件
                map.on('overlayadd', function(e) {
                    activeOverlays.add(e.name);
                    updateDynamicLegend();
                });

                map.on('overlayremove', function(e) {
                    activeOverlays.delete(e.name);
                    updateDynamicLegend();
                });

                // 初始化圖例
                updateDynamicLegend();
            })
            .catch(err => {
                console.error("地圖數據載入失敗:", err);
                
                // 網路出錯時解除黑屏遮罩，並顯示重新整理按鈕
                const container = document.getElementById('loading-overlay');
                if (container) {
                    container.innerHTML = `
                        <div class="bg-white p-6 rounded-lg shadow-xl max-w-sm text-center border border-slate-200">
                            <p class="text-red-500 font-bold text-lg mb-2">⚠️ 圖資載入超時或失敗</p>
                            <p class="text-slate-600 text-sm mb-4">無法從外部 CDN 伺服器取得地圖界線。這通常是因為連線至 GitHub 或 CDN 暫時不穩定。</p>
                            <button onclick="window.location.reload()" class="bg-slate-800 text-white px-5 py-2.5 rounded font-semibold text-sm hover:bg-slate-700 transition">重新整理網頁</button>
                        </div>
                    `;
                }
            });

        // 7. 動態圖例管理器
        function updateDynamicLegend() {
            const container = document.getElementById('legend-content');
            if (!container) return;
            container.innerHTML = '';

            if (activeOverlays.size === 0) {
                container.innerHTML = '<div class="text-xs text-slate-400 italic">無選取圖層</div>';
                return;
            }

            activeOverlays.forEach(layerName => {
                let html = `<div class="border-b border-slate-100 pb-2.5 last:border-0 last:pb-0">
                    <p class="text-xs font-bold text-slate-700 mb-1.5 flex items-center gap-1">
                        <span class="w-1.5 h-1.5 rounded-full bg-slate-400"></span> ${layerName}
                    </p>
                    <div class="space-y-1 pl-2.5">`;

                if (layerName === "空氣中總懸浮微粒 (TSP)") {
                    html += `
                        <div class="flex items-center text-[10px] text-slate-600"><span class="w-3 h-2 rounded-sm mr-2" style="background:#a855f7"></span>&gt; 45 µg/m³ (高)</div>
                        <div class="flex items-center text-[10px] text-slate-600"><span class="w-3 h-2 rounded-sm mr-2" style="background:#ef4444"></span>40 - 45 µg/m³</div>
                        <div class="flex items-center text-[10px] text-slate-600"><span class="w-3 h-2 rounded-sm mr-2" style="background:#f97316"></span>35 - 40 µg/m³</div>
                        <div class="flex items-center text-[10px] text-slate-600"><span class="w-3 h-2 rounded-sm mr-2" style="background:#eab308"></span>30 - 35 µg/m³</div>
                        <div class="flex items-center text-[10px] text-slate-600"><span class="w-3 h-2 rounded-sm mr-2" style="background:#10b981"></span>&lt; 30 µg/m³ (低)</div>
                        <div class="flex items-center text-[10px] text-slate-600"><span class="w-3 h-2 rounded-sm mr-2" style="background:#cbd5e1"></span>無一般人工監測站</div>
                    `;
                } else if (layerName === "空氣中臭氧 (Ozone)") {
                    html += `
                        <div class="flex items-center text-[10px] text-slate-600"><span class="w-3 h-2 rounded-sm mr-2" style="background:#ef4444"></span>&gt; 58 ppb (高)</div>
                        <div class="flex items-center text-[10px] text-slate-600"><span class="w-3 h-2 rounded-sm mr-2" style="background:#f97316"></span>55 - 58 ppb</div>
                        <div class="flex items-center text-[10px] text-slate-600"><span class="w-3 h-2 rounded-sm mr-2" style="background:#eab308"></span>50 - 55 ppb</div>
                        <div class="flex items-center text-[10px] text-slate-600"><span class="w-3 h-2 rounded-sm mr-2" style="background:#10b981"></span>45 - 50 ppb</div>
                        <div class="flex items-center text-[10px] text-slate-600"><span class="w-3 h-2 rounded-sm mr-2" style="background:#3b82f6"></span>&lt; 45 ppb (低)</div>
                    `;
                } else if (layerName === "二氧化硫 (SO₂)") {
                    html += `
                        <div class="flex items-center text-[10px] text-slate-600"><span class="w-3 h-2 rounded-sm mr-2" style="background:#a855f7"></span>&gt; 1.6 ppb (高)</div>
                        <div class="flex items-center text-[10px] text-slate-600"><span class="w-3 h-2 rounded-sm mr-2" style="background:#ef4444"></span>1.3 - 1.6 ppb</div>
                        <div class="flex items-center text-[10px] text-slate-600"><span class="w-3 h-2 rounded-sm mr-2" style="background:#f97316"></span>1.1 - 1.3 ppb</div>
                        <div class="flex items-center text-[10px] text-slate-600"><span class="w-3 h-2 rounded-sm mr-2" style="background:#eab308"></span>0.9 - 1.1 ppb</div>
                        <div class="flex items-center text-[10px] text-slate-600"><span class="w-3 h-2 rounded-sm mr-2" style="background:#10b981"></span>&lt; 0.9 ppb (低)</div>
                    `;
                } else if (layerName === "AQI > 100 日數比率") {
                    html += `
                        <div class="flex items-center text-[10px] text-slate-600"><span class="w-3 h-2 rounded-sm mr-2" style="background:#a855f7"></span>&gt; 12.0% (高)</div>
                        <div class="flex items-center text-[10px] text-slate-600"><span class="w-3 h-2 rounded-sm mr-2" style="background:#ef4444"></span>8.0% - 12.0%</div>
                        <div class="flex items-center text-[10px] text-slate-600"><span class="w-3 h-2 rounded-sm mr-2" style="background:#f97316"></span>4.0% - 8.0%</div>
                        <div class="flex items-center text-[10px] text-slate-600"><span class="w-3 h-2 rounded-sm mr-2" style="background:#eab308"></span>2.0% - 4.0%</div>
                        <div class="flex items-center text-[10px] text-slate-600"><span class="w-3 h-2 rounded-sm mr-2" style="background:#10b981"></span>&lt; 2.0% (良好)</div>
                    `;
                }

                html += `</div></div>`;
                container.innerHTML += html;
            });
        }
    </script>
</body>
</html>
