<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>台灣空間數據疊圖系統 - 113年統計</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin: 0; padding: 0; font-family: "Microsoft JhengHei", sans-serif; }
        #map { position: absolute; top: 0; bottom: 0; width: 100%; }
        
        /* 圖例樣式 */
        .legend {
            background: white;
            padding: 10px;
            line-height: 18px;
            color: #333;
            box-shadow: 0 0 15px rgba(0,0,0,0.2);
            border-radius: 5px;
        }
        .legend i {
            width: 18px;
            height: 18px;
            float: left;
            margin-right: 8px;
            opacity: 0.7;
        }
        .info-box {
            position: absolute;
            top: 10px;
            left: 50px;
            z-index: 1000;
            background: rgba(255,255,255,0.9);
            padding: 10px;
            border-radius: 4px;
            border: 1px solid #ccc;
        }
    </style>
</head>
<body>

<div class="info-box">
    <h3 style="margin:0 0 5px 0;">113年數據分析圖層</h3>
    <small>點擊右上角控制項切換圖層</small>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
    // 1. 初始化地圖 (中心點設在台灣)
    var map = L.map('map').setView([23.7, 121.0], 7);

    // 2. 加入底圖 (使用 CartoDB 乾淨底圖，較能突顯數據圖層)
    L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
        attribution: '&copy; OpenStreetMap &copy; CARTO'
    }).addTo(map);

    // --- 數據填入區 (重要：請將 Mapshaper 轉換出的 GeoJSON 貼在括號內) ---
    
    // 圖層 A: 縣市空品統計 (預設開啟)
    var aqiData = null; // [請在此貼上 113年行政區空氣品質_縣市.json 的內容]

    // 圖層 B: 全台村里人口指標
    var popData = null; // [請在此貼上 113年12月行政區人口指標_全台村里.json 的內容]

    // 圖層 C: 台北市工商家數 (一級發布區)
    var bizData = null; // [請在此貼上 113年12月臺北市工商家數.json 的內容]

    // --- 著色函數 (根據您的 CSV COLUMN4: AQI>100日數比率) ---
    function getAqiColor(d) {
        return d > 10 ? '#800026' : // 極高
               d > 7  ? '#BD0026' :
               d > 5  ? '#E31A1C' :
               d > 3  ? '#FC4E2A' :
               d > 1  ? '#FD8D3C' :
                        '#FEB24C'; // 較低
    }

    // 3. 實作縣市空品圖層
    var aqiLayer = L.layerGroup();
    if (aqiData) {
        L.geoJson(aqiData, {
            style: function(feature) {
                return {
                    fillColor: getAqiColor(feature.properties.COLUMN4), // 對應 CSV 數值
                    weight: 1.5,
                    opacity: 1,
                    color: 'white',
                    fillOpacity: 0.7
                };
            },
            onEachFeature: function(feature, layer) {
                layer.bindPopup(
                    "<b>縣市名稱: " + feature.properties.COUNTY + "</b><br>" +
                    "AQI > 100 日數比率: " + feature.properties.COLUMN4 + "%"
                );
            }
        }).addTo(aqiLayer);
    }
    aqiLayer.addTo(map); // 預設加入地圖

    // 4. 實作人口指標圖層
    var popLayer = L.layerGroup();
    if (popData) {
        L.geoJson(popData, {
            style: { color: "#2980b9", weight: 0.5, fillOpacity: 0.4 },
            onEachFeature: function(feature, layer) {
                layer.bindPopup("村里: " + feature.properties.VILLAGE + "<br>人口密度: " + feature.properties.P_DEN);
            }
        }).addTo(popLayer);
    }

    // 5. 實作工商家數圖層
    var bizLayer = L.layerGroup();
    if (bizData) {
        L.geoJson(bizData, {
            style: { color: "#27ae60", weight: 1, fillOpacity: 0.5 },
            onEachFeature: function(feature, layer) {
                layer.bindPopup("台北市工商發布區數據");
            }
        }).addTo(bizLayer);
    }

    // 6. 圖層切換控制項
    var overlayMaps = {
        "☁️ 縣市空品統計 (AQI > 100比率)": aqiLayer,
        "👥 村里人口指標": popLayer,
        "🏢 台北市工商家數": bizLayer
    };

    L.control.layers(null, overlayMaps, { collapsed: false }).addTo(map);

    // 7. 新增右下角圖例
    var legend = L.control({position: 'bottomright'});
    legend.onAdd = function (map) {
        var div = L.DomUtil.create('div', 'legend'),
            grades = [0, 1, 3, 5, 7, 10],
            labels = ["<strong>AQI > 100 比率 (%)</strong><br>"];
        for (var i = 0; i < grades.length; i++) {
            div.innerHTML +=
                '<i style="background:' + getAqiColor(grades[i] + 0.1) + '"></i> ' +
                grades[i] + (grades[i + 1] ? '&ndash;' + grades[i + 1] + '<br>' : '+');
        }
        return div;
    };
    legend.addTo(map);

</script>

</body>
</html>
