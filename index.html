<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>台北即時 AQI 與空品區範圍地圖</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        body, html { margin: 0; padding: 0; height: 100%; font-family: "Microsoft JhengHei", sans-serif; }
        #map { height: 100vh; width: 100%; }
        
        /* 側邊資訊面板 */
        .info-panel {
            position: absolute;
            top: 20px;
            right: 20px;
            z-index: 1000;
            background: rgba(255, 255, 255, 0.9);
            padding: 15px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0,0,0,0.2);
            width: 280px;
            display: none;
        }
    </style>
</head>
<body>

    <div id="map"></div>

    <div id="info-box" class="info-panel">
        <h4 style="margin:0 0 10px 0;">環境部空品區資料</h4>
        <p id="data-desc" style="font-size: 13px; line-height: 1.6;"></p>
        <hr>
        <small>更新頻率：不定期</small>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script>
        // 1. 初始化地圖
        const map = L.map('map').setView([25.0330, 121.5654], 10);
        const osm = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap'
        }).addTo(map);

        // 2. AQICN 即時空氣品質圖層
        const waqiLayer = L.tileLayer('https://tiles.waqi.info/tiles/usepa-aqi/{z}/{x}/{y}.png?token=demo', {
            attribution: '© waqi.info',
            opacity: 0.7
        }).addTo(map);

        // 3. 從 CSV 提取的空品區範圍圖層 (模擬範圍)
        const areaLayer = L.layerGroup();
        
        // 根據 CSV 描述：北部空品區包含台北、新北、基隆、桃園
        // 這裡繪製一個示意性的多邊形範圍
        const northernAQZ = L.polygon([
            [25.30, 121.00],
            [25.30, 122.00],
            [24.70, 122.00],
            [24.70, 121.00]
        ], {
            color: 'blue',
            fillColor: '#30f',
            fillOpacity: 0.1,
            weight: 2
        }).addTo(areaLayer).bindPopup("<b>北部空氣品質區</b><br>包含基隆市、臺北市、新北市、桃園市");

        // CSV 中的元數據描述
        const csvMetadata = "顯示依區域空氣品質污染特性劃分成7個空氣品質區，包含北部、竹苗、中部、雲嘉南、高屏、宜蘭、花東7個空氣品質區範圍。";

        // 4. 圖層控制邏輯 (Toggle)
        const overlayMaps = {
            "即時 AQI 監測 (同步)": waqiLayer,
            "空品區範圍 (CSV 資料)": areaLayer
        };

        L.control.layers(null, overlayMaps, { collapsed: false }).addTo(map);

        // 5. 監聽 Toggle 事件來顯示資訊面板
        map.on('overlayadd', function(e) {
            if (e.name === "空品區範圍 (CSV 資料)") {
                document.getElementById('info-box').style.display = 'block';
                document.getElementById('data-desc').innerText = csvMetadata;
            }
        });

        map.on('overlayremove', function(e) {
            if (e.name === "空品區範圍 (CSV 資料)") {
                document.getElementById('info-box').style.display = 'none';
            }
        });

    </script>
</body>
</html>
