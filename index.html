<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>台北市污染監測地圖系統</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <style>
        body, html { margin: 0; padding: 0; height: 100%; font-family: "Microsoft JhengHei", sans-serif; }
        #map { height: 100vh; width: 100%; }
        
        /* 數據面板樣式 */
        #data-panel {
            position: absolute;
            top: 20px;
            right: 20px;
            z-index: 1000;
            background: white;
            padding: 15px;
            border-radius: 8px;
            box-shadow: 0 0 15px rgba(0,0,0,0.2);
            width: 350px;
            display: none; /* 初始隱藏，由圖層控制觸發 */
        }
        .legend-title { font-weight: bold; margin-bottom: 10px; border-bottom: 1px solid #ccc; padding-bottom: 5px; }
    </style>
</head>
<body>

    <div id="map"></div>

    <div id="data-panel">
        <div class="legend-title">交通工具排放污染統計 (汽車)</div>
        <canvas id="pollutionChart"></canvas>
        <p style="font-size: 12px; color: #666;">* 數據來源：您提供的查驗/告發統計資料</p>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script>
        // 1. 初始化地圖，以台北市為中心 [25.0330, 121.5654]
        const map = L.map('map').setView([25.0330, 121.5654], 12);

        // 2. 設定底圖 (基底層)
        const osm = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap contributors'
        }).addTo(map);

        const darkMap = L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
            attribution: '© OpenStreetMap, © CartoDB'
        });

        // 3. 定義您的資料層 (Overlay Layers)
        // 這裡我們先建立一個空的 LayerGroup 作為「汽車污染資料」的開關
        const carPollutionLayer = L.layerGroup();
        
        // 模擬從您的 CSV 提取的關鍵數據 (例如：90-100年的告發率)
        const carData = {
            labels: ['90年', '91年', '92年', '93年', '94年', '95年', '96年', '97年', '98年', '99年', '100年'],
            datasets: [{
                label: '告發率 (%)',
                data: [13.2, 12.8, 11.5, 10.9, 11.1, 11.4, 12.4, 5.7, 6.6, 1.8, 3.1],
                borderColor: 'rgb(255, 99, 132)',
                tension: 0.1
            }]
        };

        // 4. 圖層控制邏輯 (Toggle On/Off)
        const baseMaps = {
            "標準地圖": osm,
            "深色地圖": darkMap
        };

        const overlayMaps = {
            "汽車污染統計數據": carPollutionLayer
            // 您未來可以在這裡加入新資料層，例如：
            // "工廠排放": factoryLayer,
            // "空氣品質感測器": aqSensorLayer
        };

        L.control.layers(baseMaps, overlayMaps, { collapsed: false }).addTo(map);

        // 5. 監聽圖層切換事件，連動顯示/隱藏數據面板
        map.on('overlayadd', function(event) {
            if (event.name === "汽車污染統計數據") {
                document.getElementById('data-panel').style.display = 'block';
                renderChart();
            }
        });

        map.on('overlayremove', function(event) {
            if (event.name === "汽車污染統計數據") {
                document.getElementById('data-panel').style.display = 'none';
            }
        });

        // 6. 渲染圖表函數
        let myChart = null;
        function renderChart() {
            const ctx = document.getElementById('pollutionChart').getContext('2d');
            if (myChart) myChart.destroy(); // 避免重複渲染
            myChart = new Chart(ctx, {
                type: 'line',
                data: carData,
                options: {
                    responsive: true,
                    scales: { y: { beginAtZero: true } }
                }
            });
        }

        // 7. 預設在地圖上標記台北市政府作為中心參考點
        L.marker([25.0330, 121.5654]).addTo(carPollutionLayer)
            .bindPopup("<b>台北市交通監測中心</b><br>汽車污染數據已載入。");

    </script>
</body>
</html>
